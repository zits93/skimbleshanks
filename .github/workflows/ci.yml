name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  python-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install . pytest pytest-cov
    - name: Run tests
      run: |
        pytest --cov=src tests/
      env:
        SRTGO_API_KEY: "test-key"

  frontend-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Run Build
      run: |
        cd frontend
        npm run build
    - name: Run Tests & Coverage
      run: |
        cd frontend
        npm run coverage
